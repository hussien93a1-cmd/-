        const { useState, useEffect, useContext, createContext, useMemo, useRef } = React;
        const { HashRouter, Routes, Route, NavLink, Outlet, useNavigate, useLocation, Navigate } = ReactRouterDOM;

        // --- ICONS (Minimal SVG Implementation) ---

            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>

        );

        // Icon Paths
        const iconPaths = {

            ShoppingBag: <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>,

            Share2: <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/>,

            Box: <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/>,
            Wallet: <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>,

            AlertTriangle: <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/>,
            UtensilsCrossed: <path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8"/><path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2 0L19 10"/><path d="M17 17 6.3 6.3a4.2 4.2 0 0 1 0-6L20 6.5"/><path d="M12 21.8v-2.1a1 1 0 0 1 1-1h2.2a1 1 0 0 1 1 1v2.1a2 2 0 0 1-2 2h-0.2a2 2 0 0 1-2-2z"/>,
            RotateCcw: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>,
            Edit2: <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>,
            Eye: <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>,
            Wifi: <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" x2="12.01" y1="20" y2="20"/>,
            Bluetooth: <path d="m7 7 10 10-5 5V2l5 5L7 17"/>,
            Usb: <circle cx="10" cy="7" r="1"/><circle cx="4" cy="20" r="1"/><path d="M4.7 19.3 19 5"/><path d="m21 3-3 1 2 2Z"/><path d="M9.26 7.68 5 12l2 5"/><path d="m10 14 5 2 3.5-3.5"/><path d="m18 12 1-1 1 1-1 1Z"/>,
            Smartphone: <rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/>,
            Calendar: <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>,
            Coins: <circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/><path d="M11 7.23a4 4 0 0 1 4 0"/>,
            CalendarCheck: <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="m9 16 2 2 4-4"/>,
            MessageCircle: <path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/>,
            CheckCircle: <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>,
            Lock: <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        };

        const Icons = Object.keys(iconPaths).reduce((acc, key) => {
            acc[key] = (props) => <Icon path={iconPaths[key]} {...props} />;
            return acc;
        }, {});

        // Destructure Icons for easier use
        const { 
            Search, Plus, Minus, Trash2, ShoppingBag, CreditCard, Banknote, Utensils, Clock, Receipt, 
            ArrowRight, Printer, ChefHat, X, ChevronDown, LayoutGrid, Grid, FileText, Settings, DollarSign, 
            LogOut, TrendingUp, Download, ArrowUpRight, ArrowDownRight, Share2, Loader2, ListFilter, Box, 
            Wallet, Users, Save, AlertTriangle, UtensilsCrossed, RotateCcw, Edit2, Eye, Wifi, Bluetooth, 
            Usb, Smartphone, Calendar, Coins, CalendarCheck, MessageCircle, CheckCircle, TrendingDown,
            ArrowUpCircle, ArrowDownCircle, Lock
        } = Icons;


        // --- CONSTANTS ---
        const TAX_RATE = 0.0;
        const INITIAL_CATEGORIES = [
          { id: 'cat1', name: 'مشويات' },
          { id: 'cat2', name: 'وجبات غربية' },
          { id: 'cat3', name: 'مقبلات' },
          { id: 'cat4', name: 'مشروبات' },
        ];
        const INITIAL_PRODUCTS = [];
        const INITIAL_TABLES = Array.from({ length: 12 }, (_, i) => ({
          id: `t${i + 1}`, name: `طاولة ${i + 1}`, capacity: 4, status: 'available',
        }));
        const CURRENT_USER = { id: 'u1', name: 'أحمد الكاشير', role: 'admin' };

        // --- CONTEXT ---
        const StoreContext = createContext();

        const StoreProvider = ({ children }) => {
          const [products, setProducts] = useState(INITIAL_PRODUCTS);
          const [categories, setCategories] = useState(INITIAL_CATEGORIES);
          const [tables, setTables] = useState(INITIAL_TABLES);
          const [orders, setOrders] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [employees, setEmployees] = useState([]);
          const [workLogs, setWorkLogs] = useState([]);
          const [currentOrder, setCurrentOrder] = useState(null);
          const [printerConfig, setPrinterConfig] = useState({
            type: 'bluetooth', paperSize: '80mm', target: '', autoPrintReceipt: true, autoPrintKitchen: true
          });

          // Storage
          useEffect(() => {
            const load = (k) => JSON.parse(localStorage.getItem(k) || 'null');
            const o = load('pos_orders'), t = load('pos_tables'), p = load('pos_products'),
                  c = load('pos_categories'), e = load('pos_expenses'), emp = load('pos_employees'),
                  w = load('pos_worklogs'), pr = load('pos_printer');
            if (o) setOrders(o); if (t) setTables(t); if (p) setProducts(p); if (c) setCategories(c);
            if (e) setExpenses(e); if (emp) setEmployees(emp); if (w) setWorkLogs(w); if (pr) setPrinterConfig(pr);
          }, []);

          useEffect(() => {
            const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
            save('pos_orders', orders); save('pos_tables', tables); save('pos_products', products);
            save('pos_categories', categories); save('pos_expenses', expenses); save('pos_employees', employees);
            save('pos_worklogs', workLogs); save('pos_printer', printerConfig);
          }, [orders, tables, products, categories, expenses, employees, workLogs, printerConfig]);

          // Logic
          const startNewOrder = (type, tableId) => {
            setCurrentOrder({
              id: crypto.randomUUID(), orderNumber: orders.length + 1, type, tableId,
              status: 'pending', items: [], subtotal: 0, tax: 0, total: 0, totalCost: 0, createdAt: new Date().toISOString(),
            });
          };

          const calculateTotals = (items) => {
            const subtotal = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const totalCost = items.reduce((sum, item) => sum + (item.cost * item.quantity), 0);
            const tax = subtotal * TAX_RATE;
            return { subtotal, tax, total: subtotal + tax, totalCost };
          };

          const addToCart = (product, variant, quantity = 1) => {
            if (!currentOrder) {
                const tempItems = [{
                    id: crypto.randomUUID(), productId: product.id, productName: product.name,
                    variantId: variant.id, variantName: variant.name, price: variant.price, cost: variant.cost, quantity
                }];
                const totals = calculateTotals(tempItems);
                setCurrentOrder({
                    id: crypto.randomUUID(), orderNumber: orders.length + 1, type: 'takeaway', status: 'pending',
                    items: tempItems, ...totals, createdAt: new Date().toISOString()
                });
                return;
            }
            const updatedItems = [...currentOrder.items, {
                id: crypto.randomUUID(), productId: product.id, productName: product.name,
                variantId: variant.id, variantName: variant.name, price: variant.price, cost: variant.cost, quantity
            }];
            const totals = calculateTotals(updatedItems);
            setCurrentOrder({ ...currentOrder, items: updatedItems, ...totals });
          };

          const updateCartItemQuantity = (itemId, quantity) => {
            if (!currentOrder || quantity < 1) return;
            const updatedItems = currentOrder.items.map(item => item.id === itemId ? { ...item, quantity } : item);
            setCurrentOrder({ ...currentOrder, items: updatedItems, ...calculateTotals(updatedItems) });
          };

          const removeFromCart = (itemId) => {
             if(!currentOrder) return;
             const updatedItems = currentOrder.items.filter(item => item.id !== itemId);
             setCurrentOrder({ ...currentOrder, items: updatedItems, ...calculateTotals(updatedItems) });
          }

          const clearCart = () => currentOrder && setCurrentOrder({ ...currentOrder, items: [], subtotal: 0, tax: 0, total: 0, totalCost: 0 });

          const saveOrder = (asPending = true) => {
            if (!currentOrder) return;
            const updatedOrder = { ...currentOrder, status: asPending ? 'pending' : 'completed' };
            const exists = orders.findIndex(o => o.id === currentOrder.id);
            const newOrders = [...orders];
            if (exists > -1) newOrders[exists] = updatedOrder; else newOrders.push(updatedOrder);
            setOrders(newOrders);

            if (currentOrder.type === 'dine-in' && currentOrder.tableId) {
                setTables(prev => prev.map(t => t.id === currentOrder.tableId ? { ...t, status: 'occupied', currentOrderId: currentOrder.id } : t));
            }
            if (asPending) setCurrentOrder(null);
          };

          const checkoutOrder = (paymentMethod) => {
            if (!currentOrder) return;
            const completed = { ...currentOrder, status: 'completed', paymentMethod };
            const exists = orders.findIndex(o => o.id === completed.id);
            const newOrders = [...orders];
            if (exists > -1) newOrders[exists] = completed; else newOrders.push(completed);
            setOrders(newOrders);
            if (currentOrder.type === 'dine-in' && currentOrder.tableId) {
                setTables(prev => prev.map(t => t.id === currentOrder.tableId ? { ...t, status: 'available', currentOrderId: undefined } : t));
            }
            setCurrentOrder(null);
          };

          const openExistingOrder = (id) => {
            const o = orders.find(x => x.id === id);
            if (o && o.status === 'pending') setCurrentOrder(o);
          };

          const cancelOrder = (id) => {
              const o = orders.find(x => x.id === id);
              if(!o) return;
              setOrders(prev => prev.map(x => x.id === id ? { ...x, status: 'cancelled' } : x));
              if(currentOrder?.id === id) setCurrentOrder(null);
              if(o.type === 'dine-in' && o.tableId) setTables(prev => prev.map(t => t.id === o.tableId ? { ...t, status: 'available', currentOrderId: undefined } : t));
          }

          const updateTableCount = (count) => {
            if (count < 1) return;
            setTables(prev => {
                if (count > prev.length) {
                    const add = Array.from({ length: count - prev.length }, (_, i) => ({
                        id: `t${prev.length + i + 1}`, name: `طاولة ${prev.length + i + 1}`, capacity: 4, status: 'available'
                    }));
                    return [...prev, ...add];
                }
                return prev.slice(0, count);
            });
          };

          const addProduct = (p) => setProducts([...products, p]);
          const updateProduct = (p) => setProducts(products.map(x => x.id === p.id ? p : x));
          const deleteProduct = (id) => setProducts(products.filter(x => x.id !== id));
          const addExpense = (e) => setExpenses([...expenses, e]);
          const deleteExpense = (id) => setExpenses(expenses.filter(x => x.id !== id));
          const addEmployee = (e) => setEmployees([...employees, e]);
          const deleteEmployee = (id) => setEmployees(employees.filter(x => x.id !== id));
          const addWorkLog = (l) => setWorkLogs([...workLogs, l]);
          const deleteWorkLog = (id) => setWorkLogs(workLogs.filter(x => x.id !== id));

          return (
            <StoreContext.Provider value={{
              products, categories, tables, orders, expenses, employees, workLogs, currentOrder, currentUser: CURRENT_USER, printerConfig,
              startNewOrder, addToCart, removeFromCart, updateCartItemQuantity, clearCart, saveOrder, checkoutOrder, openExistingOrder, cancelOrder,
              addProduct, updateProduct, deleteProduct, addExpense, deleteExpense, addEmployee, deleteEmployee, addWorkLog, deleteWorkLog,
              updateTableCount, setPrinterConfig: (c) => setPrinterConfig(c), updatePrinterConfig: (c) => setPrinterConfig(c)
            }}>
              {children}
            </StoreContext.Provider>
          );
        };
        const useStore = () => useContext(StoreContext);


        // --- COMPONENTS ---

        // Layout
        const Layout = () => {
            const location = useLocation();
            const navItems = [
                { to: '/', icon: <LayoutGrid size={24} />, label: 'الكاشير (POS)' },
                { to: '/tables', icon: <Grid size={24} />, label: 'الطاولات والسفري' },
                { to: '/reports', icon: <FileText size={24} />, label: 'التقارير' },
                { to: '/finance', icon: <DollarSign size={24} />, label: 'الحسابات' },

            const { orders } = useStore();

            const [viewMode, setViewMode] = useState('variants');
            const [isGeneratingImage, setIsGeneratingImage] = useState(false);
            const [customStart, setCustomStart] = useState('');
            const [customEnd, setCustomEnd] = useState('');

            const filteredOrders = useMemo(() => {
                const now = new Date(); let start = new Date(), end = new Date();
                if (filterType === 'today') { start.setHours(0,0,0,0); end.setHours(23,59,59,999); }
                else if (filterType === 'week') { start.setDate(now.getDate()-6); start.setHours(0,0,0,0); end = now; }
                else if (filterType === 'month') { start = new Date(now.getFullYear(), now.getMonth(), 1); end = now; }
                else if (filterType === 'custom' && customStart && customEnd) { start = new Date(customStart); end = new Date(customEnd); end.setHours(23,59,59); }
                return orders.filter(o => o.status === 'completed' && new Date(o.createdAt) >= start && new Date(o.createdAt) <= end);
            }, [orders, filterType, customStart, customEnd]);

            const stats = useMemo(() => {
                const s = {};
                filteredOrders.forEach(o => o.items.forEach(i => {
                    const k = viewMode === 'general' ? i.productId : `${i.productId}-${i.variantId}`;
                    if (!s[k]) s[k] = { name: i.productName, variant: viewMode === 'general' ? 'الكل' : i.variantName, qty: 0, revenue: 0, cost: 0, profit: 0 };
                    s[k].qty += i.quantity; s[k].revenue += i.price * i.quantity; s[k].cost += i.cost * i.quantity; s[k].profit += (i.price - i.cost) * i.quantity;

            const [withdrawAmount, setWithdrawAmount] = useState('');
            const [newEmp, setNewEmp] = useState({ name: '', salary: '' });
            const [selectedEmp, setSelectedEmp] = useState(null);
            
            const stats = useMemo(() => {
                const sales = orders.filter(o => o.status === 'completed' && o.paymentMethod === 'cash').reduce((a,b) => a + b.total, 0);
                const exp = expenses.filter(e => e.category !== 'deduction').reduce((a,b) => a + b.amount, 0);
                return { sales, exp, cash: sales - exp };
            }, [orders, expenses]);

            const handleExpense = (e) => { e.preventDefault(); const fd = new FormData(e.target); addExpense({ id: crypto.randomUUID(), description: fd.get('desc'), amount: Number(fd.get('amount')), category: 'supplies', date: new Date().toISOString() }); e.target.reset(); };
            const handlePayroll = (type, amount) => { 
                if(type === 'entitlement') addWorkLog({ id: crypto.randomUUID(), employeeId: selectedEmp.id, date: new Date().toISOString(), amount: Number(amount), description: 'استحقاق' }); 
                else addExpense({ id: crypto.randomUUID(), description: type, amount: Number(amount), category: type === 'salary' ? 'salary' : 'withdrawal', date: new Date().toISOString(), employeeId: selectedEmp.id });
                setSelectedEmp(null);
            };

            return (
                <div className="h-full flex flex-col pb-20">
                     <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Wallet className="text-primary"/> المالية</h2>
                     <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div className="bg-white p-4 rounded-xl border"><div>مقبوضات</div><div className="text-2xl font-bold">{stats.sales.toFixed(2)}</div></div>
                        <div className="bg-white p-4 rounded-xl border"><div>مصروفات</div><div className="text-2xl font-bold text-red-500">{stats.exp.toFixed(2)}</div></div>
                        <div className="bg-slate-800 text-white p-4 rounded-xl"><div>رصيد الصندوق</div><div className="text-3xl font-bold text-emerald-400">{stats.cash.toFixed(2)}</div><button onClick={() => setWithdrawModal(true)} className="mt-2 bg-emerald-500 px-3 py-1 rounded text-sm w-full">سحب</button></div>
                     </div>
                     <div className="flex gap-4 mb-4"><button onClick={() => setTab('employees')} className={`flex-1 py-2 rounded-lg border font-bold ${tab === 'employees' ? 'bg-slate-800 text-white' : 'bg-white'}`}>الموظفين</button><button onClick={() => setTab('expenses')} className={`flex-1 py-2 rounded-lg border font-bold ${tab === 'expenses' ? 'bg-slate-800 text-white' : 'bg-white'}`}>المصاريف</button></div>
                     {tab === 'employees' ? (
                        <div className="flex-1 overflow-y-auto">
                            <div className="mb-4 flex gap-2"><input placeholder="اسم الموظف" className="p-2 border rounded" onChange={e => setNewEmp({...newEmp, name: e.target.value})}/><input placeholder="الراتب" className="p-2 border rounded w-24" onChange={e => setNewEmp({...newEmp, salary: e.target.value})}/><button onClick={() => addEmployee({ id: crypto.randomUUID(), name: newEmp.name, baseSalary: Number(newEmp.salary), salaryType: 'monthly' })} className="bg-primary text-white px-4 rounded">إضافة</button></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {employees.map(e => {
                                    const earned = workLogs.filter(w => w.employeeId === e.id).reduce((a,b) => a + b.amount, 0);
                                    const paid = expenses.filter(x => x.employeeId === e.id).reduce((a,b) => a + b.amount, 0);
                                    return (
                                        <div key={e.id} className="bg-white p-4 rounded-xl border shadow-sm">
                                            <div className="font-bold text-lg">{e.name}</div>
                                            <div className="text-sm text-gray-500 mb-2">راتب: {e.baseSalary}</div>
                                            <div className="text-sm flex justify-between"><span>مستحق: <span className="text-green-600">{earned}</span></span><span>مدفوع: <span className="text-red-500">{paid}</span></span></div>
                                            <div className="font-bold border-t mt-2 pt-2">صافي: {earned - paid}</div>
                                            <button onClick={() => setSelectedEmp(e)} className="w-full mt-2 bg-slate-800 text-white py-2 rounded">حركة مالية</button>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                     ) : (
                        <div className="flex-1 overflow-y-auto">
                            <form onSubmit={handleExpense} className="flex gap-2 mb-4"><input name="desc" placeholder="الوصف" className="flex-1 p-2 border rounded" required/><input name="amount" placeholder="المبلغ" type="number" className="w-24 p-2 border rounded" required/><button className="bg-red-500 text-white px-4 rounded">تسجيل</button></form>
                            <table className="w-full text-right bg-white rounded-xl shadow-sm"><tbody className="divide-y">{expenses.slice().reverse().map(e => <tr key={e.id}><td className="p-3">{e.description}</td><td className="p-3 font-bold text-red-500">{e.amount}</td><td className="p-3 text-xs text-gray-400">{new Date(e.date).toLocaleDateString()}</td></tr>)}</tbody></table>
                        </div>
                     )}
                     {selectedEmp && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white p-6 rounded-xl w-full max-w-sm">
                                <h3 className="font-bold mb-4">{selectedEmp.name}</h3>
                                <div className="space-y-2">
                                    <button onClick={() => handlePayroll('entitlement', selectedEmp.baseSalary)} className="w-full py-3 bg-green-100 text-green-700 font-bold rounded">تسجيل استحقاق راتب</button>
                                    <div className="flex gap-2">
                                        <button onClick={() => { const amt = prompt('المبلغ'); if(amt) handlePayroll('withdrawal', amt); }} className="flex-1 py-3 bg-orange-100 text-orange-700 font-bold rounded">سلفة</button>
                                        <button onClick={() => { const amt = prompt('المبلغ'); if(amt) handlePayroll('salary', amt); }} className="flex-1 py-3 bg-blue-100 text-blue-700 font-bold rounded">تسليم راتب</button>
                                    </div>
                                </div>
                                <button onClick={() => setSelectedEmp(null)} className="w-full mt-4 py-2 bg-gray-100 rounded">إغلاق</button>
                            </div>
                        </div>
                     )}
                     {withdrawModal && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white p-6 rounded-xl">
                                <h3 className="font-bold mb-4">سحب من الصندوق</h3>
                                <input className="w-full p-2 border rounded mb-4" type="number" onChange={e => setWithdrawAmount(e.target.value)} autoFocus />
                                <div className="flex gap-2"><button onClick={() => { addExpense({id:crypto.randomUUID(), description:'سحب', amount: Number(withdrawAmount), category:'other', date: new Date().toISOString()}); setWithdrawModal(false); }} className="flex-1 bg-primary text-white py-2 rounded">تأكيد</button><button onClick={() => setWithdrawModal(false)} className="flex-1 bg-gray-100 py-2 rounded">إلغاء</button></div>
                            </div>
                        </div>
                     )}
                </div>
            );
        };

        const Settings = () => {
            const { tables, updateTableCount, products, categories, addProduct, updateProduct, deleteProduct, orders, printerConfig, updatePrinterConfig } = useStore();
            const [activeTab, setActiveTab] = useState('printer');
            const [tableCount, setTableCount] = useState(tables.length);
            const [saved, setSaved] = useState(false);
            const [currentProduct, setCurrentProduct] = useState({ variants: [] });
            const [isEditing, setIsEditing] = useState(false);
            const [selOrder, setSelOrder] = useState(null);
            const receiptRef = useRef(null);

            const handleSave = () => { updateTableCount(tableCount); setSaved(true); setTimeout(() => setSaved(false), 2000); };
            const handleProdSave = () => { if(products.find(p => p.id === currentProduct.id)) updateProduct(currentProduct); else addProduct(currentProduct); setIsEditing(false); };
            const downloadReceipt = async () => { 
                if(!receiptRef.current) return; 
                const canvas = await html2canvas(receiptRef.current, { scale: 2, backgroundColor:'#fff' }); 
                const a = document.createElement('a'); a.href = canvas.toDataURL("image/png"); a.download = `rec_${selOrder.orderNumber}.png`; a.click(); 
            };

            const completedOrders = orders.filter(o => o.status !== 'pending').sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

            return (
                <div className="h-full flex flex-col pb-20 md:pb-0">
                    <h2 className="text-xl font-bold mb-4 flex gap-2"><Settings className="text-gray-500"/> الإعدادات</h2>
                    <div className="flex gap-2 overflow-x-auto pb-2 mb-4 scrollbar-hide">
                         {['invoices', 'menu', 'printer', 'general'].map(t => (
                             <button key={t} onClick={() => setActiveTab(t)} className={`px-4 py-2 rounded-lg whitespace-nowrap font-bold ${activeTab === t ? 'bg-primary text-white' : 'bg-white border'}`}>
                                {t === 'invoices' ? 'الأرشيف' : t === 'menu' ? 'المنتجات' : t === 'printer' ? 'الطابعة' : 'عام'}
                             </button>
                         ))}
                    </div>
                    <div className="flex-1 overflow-hidden">
                        {activeTab === 'invoices' && (
                            <div className="h-full overflow-y-auto bg-white rounded-xl shadow-sm p-4">
                                <div className="space-y-3">
                                    {completedOrders.map(o => (
                                        <div key={o.id} className="border p-3 rounded-xl flex justify-between items-center">
                                            <div><div className="font-bold">#{o.orderNumber}</div><div className="text-xs text-gray-500">{new Date(o.createdAt).toLocaleDateString()}</div></div>
                                            <div className="font-bold text-primary">{o.total.toFixed(2)}</div>
                                            <button onClick={() => setSelOrder(o)} className="p-2 bg-gray-100 rounded-lg"><Eye size={18}/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {activeTab === 'menu' && (
                             <div className="h-full overflow-y-auto pb-10">
                                <button onClick={() => { setCurrentProduct({ id: crypto.randomUUID(), name: '', categoryId: categories[0].id, image: '', isActive: true, variants: [{id:crypto.randomUUID(), name:'Std', price:0, cost:0}] }); setIsEditing(true); }} className="w-full py-3 bg-primary text-white rounded-xl font-bold mb-4">+ منتج جديد</button>
                                {isEditing ? (
                                    <div className="bg-white p-4 rounded-xl shadow-sm">
                                        <input className="w-full p-2 border rounded mb-2" placeholder="الاسم" value={currentProduct.name} onChange={e => setCurrentProduct({...currentProduct, name: e.target.value})} />
                                        <div className="space-y-2 mb-4">
                                            {currentProduct.variants.map((v, i) => (
                                                <div key={v.id} className="flex gap-2"><input className="w-20 p-2 border rounded" placeholder="سعر" type="number" value={v.price} onChange={e => { const n = [...currentProduct.variants]; n[i].price = Number(e.target.value); setCurrentProduct({...currentProduct, variants: n}); }} /></div>
                                            ))}
                                        </div>
                                        <div className="flex gap-2"><button onClick={handleProdSave} className="flex-1 bg-green-500 text-white py-2 rounded">حفظ</button><button onClick={() => setIsEditing(false)} className="flex-1 bg-gray-200 py-2 rounded">إلغاء</button></div>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        {products.map(p => (
                                            <div key={p.id} className="bg-white p-3 rounded-xl border relative group">
                                                <div className="font-bold">{p.name}</div>
                                                <div className="text-sm text-gray-500">{p.variants[0].price} د.ع</div>
                                                <div className="absolute top-2 left-2 flex gap-1"><button onClick={() => { setCurrentProduct(p); setIsEditing(true); }} className="p-1 bg-blue-50 text-blue-600 rounded"><Edit2 size={14}/></button><button onClick={() => deleteProduct(p.id)} className="p-1 bg-red-50 text-red-600 rounded"><Trash2 size={14}/></button></div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                             </div>
                        )}
                        {activeTab === 'general' && (
                            <div className="bg-white p-6 rounded-xl shadow-sm">
                                <label className="block mb-2 font-bold">عدد الطاولات</label>
                                <input type="number" className="w-full p-3 border rounded-xl mb-4" value={tableCount} onChange={e => setTableCount(Number(e.target.value))} />
                                <button onClick={handleSave} className="w-full py-3 bg-primary text-white rounded-xl font-bold">{saved ? 'تم الحفظ' : 'حفظ الإعدادات'}</button>
                            </div>
                        )}
                        {activeTab === 'printer' && (
                             <div className="bg-white p-6 rounded-xl shadow-sm space-y-4">
                                <div><label className="block font-bold mb-2">نوع الاتصال</label><div className="flex gap-2"><button onClick={() => updatePrinterConfig({...printerConfig, type:'wifi'})} className={`flex-1 py-3 rounded border ${printerConfig.type==='wifi'?'bg-blue-50 border-blue-500':''}`}>WiFi</button><button onClick={() => updatePrinterConfig({...printerConfig, type:'bluetooth'})} className={`flex-1 py-3 rounded border ${printerConfig.type==='bluetooth'?'bg-blue-50 border-blue-500':''}`}>Bluetooth</button></div></div>
                                <div><label className="block font-bold mb-2">Target IP/Name</label><input className="w-full p-3 border rounded" value={printerConfig.target} onChange={e => updatePrinterConfig({...printerConfig, target: e.target.value})} /></div>
                             </div>
                        )}
                    </div>
                    {selOrder && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-2xl overflow-hidden">
                                <div className="p-4 bg-gray-50 flex justify-between"><h3 className="font-bold">الفاتورة</h3><button onClick={() => setSelOrder(null)}><X size={20}/></button></div>
                                <div className="p-6 text-center bg-white" ref={receiptRef}>
                                    <h1 className="text-xl font-bold">كباب الديرة</h1>
                                    <div className="border-y py-2 my-2 flex justify-between"><span>#{selOrder.orderNumber}</span><span>{new Date(selOrder.createdAt).toLocaleDateString()}</span></div>
                                    <div className="text-right space-y-1">{selOrder.items.map((i,idx) => <div key={idx} className="flex justify-between"><span>{i.quantity}x {i.productName}</span><span>{i.price*i.quantity}</span></div>)}</div>
                                    <div className="border-t mt-2 pt-2 flex justify-between font-bold text-xl"><span>الإجمالي</span><span>{selOrder.total.toFixed(2)}</span></div>
                                </div>
                                <div className="p-4 border-t flex gap-2">
                                    <button onClick={downloadReceipt} className="flex-1 bg-green-600 text-white py-2 rounded font-bold flex items-center justify-center gap-2"><Download size={16}/> حفظ صورة</button>
                                    <button onClick={() => { setTimeout(window.print, 100); }} className="flex-1 bg-black text-white py-2 rounded font-bold flex items-center justify-center gap-2"><Printer size={16}/> طباعة</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- APP ROOT ---
        const App = () => (
            <HashRouter>
                <StoreProvider>
                    <Routes>
                        <Route path="/" element={<Layout />}>
                            <Route index element={<POS />} />
                            <Route path="tables" element={<Tables />} />
                            <Route path="reports" element={<Reports />} />
                            <Route path="finance" element={<Finance />} />
                            <Route path="settings" element={<Settings />} />
                            <Route path="*" element={<Navigate to="/" replace />} />
                        </Route>
                    </Routes>
                </StoreProvider>
            </HashRouter>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
